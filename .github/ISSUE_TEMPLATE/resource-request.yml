name: "Resource Request 🎨"
description: "Request an icon, font, or other resource for Brightlayer UI HMI components"
title: "[Resource]: "
labels: ['status: needs-review', 'resource 🎨', 'brightlayer-ui', 'type: enhancement 🚀']
assignees: []
body:
  - type: markdown
    attributes:
      value: '## Resource Request'
  - type: markdown
    attributes:
      value: Use this template to request a new icon, font, or any other resource for Brightlayer UI HMI components.
  - type: dropdown
    id: resource-type
    attributes:
      label: Resource Type
      description: 'What type of resource are you requesting?'
      options:
        - Icon
        - Font
        - Image / Illustration
        - Color / Theme Token
        - Other
    validations:
      required: true
  - type: input
    id: resource-name
    attributes:
      label: Resource Name
      description: 'Provide a suggested name for the resource'
      placeholder: 'e.g., power-meter-icon, Roboto Mono'
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: 'Describe where and how this resource will be used in HMI components'
      placeholder: 'Which component(s) need this resource? What is the context?'
    validations:
      required: true
  - type: textarea
    id: specifications
    attributes:
      label: Specifications
      description: |
        Provide relevant details such as:
        - For icons: size, style (outlined/filled/rounded), color variants
        - For fonts: weight, style, character set, language support
        - For images: format (SVG/PNG), dimensions, resolution
    validations:
      required: false
  - type: textarea
    id: visual-references
    attributes:
      label: Visual References
      description: 'Upload or link to examples, mockups, or similar resources from other libraries'
    validations:
      required: false
  - type: textarea
    id: existing-alternatives
    attributes:
      label: Existing Alternatives
      description: 'Are there any existing resources (e.g., Material Icons, Font Awesome) that are close but not suitable? Explain why.'
    validations:
      required: false
  - type: input
    id: additional-context
    attributes:
      label: Additional Context
      description: 'Anything else the reviewers should know?'
    validations:
      required: false
